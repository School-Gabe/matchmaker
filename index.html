<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchMaker</title>
</head>

<body>
    <h1>MatchMaker</h1>

    <label for="q1">Cayman is the best in the Caribbean</label><br />
    <select id="q1">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br /><br />

    <label for="q2">Coca Cola is the best soda</label><br />
    <select id="q2">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br /><br /><br />

    <button id="calcBtn">Calculate Compatibility</button>

    <p id="compatibility"></p>

    <script>
        function calculateCompatibility() {
            let q1 = parseInt(document.getElementById("q1").value);
            let q2 = parseInt(document.getElementById("q2").value);

            // Validation
            if (isNaN(q1) || isNaN(q2)) {
                document.getElementById("compatibility").innerText =
                    "Please answer all questions!";
                return;
            }

            let average = (q1 + q2) / 2;
            let percentage = (average / 5) * 100;

            let message = "";
            if (percentage > 80) {
                message = "Great match!";
            } else if (percentage > 50) {
                message = "Not bad!";
            } else {
                message = "Opposites attract?";
            }

            document.getElementById("compatibility").innerText =
                "Compatibility Score: " + percentage.toFixed(0) + "% - " + message;
        }

        // Better event handling (instead of inline onclick)
        document.getElementById("calcBtn").addEventListener("click", calculateCompatibility);
    </script>

</body>
</html>
