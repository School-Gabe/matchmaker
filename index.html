<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchMaker</title>
</head>

<body>
    <h1>MatchMaker</h1>
    <h2> Simply answer below and see if true love is for you!  To each question, answer 5
if you strongly agree, 4 if you just agree, 3 if you neither
agree nor disagree, 2 if you disagree, and 1 if you
strongly disagree.
</h2>

    <label for="q1">Cayman is the best in the Caribbean</label><br>
    <select id="q1">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br><br>

    <label for="q2">Rorschach is the best character in Watchmen</label><br>
    <select id="q2">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br><br>

    <label for="q3">Rock is better than Rap</label><br>
    <select id="q3">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br><br>

    <label for="q4">Slipknot is mid after High School</label><br>
    <select id="q4">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br><br>

    <label for="q5">Coca Cola is the best soda</label><br>
    <select id="q5">
        <option value="" disabled selected>Select an answer</option>
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Neither agree nor disagree</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br><br><br>

    <button id="calcBtn">Calculate Compatibility</button>

    <p id="compatibility"></p>

    <script>
        function calculateCompatibility() {
            let values = [];

            // Loop through all 5 questions
            for (let i = 1; i <= 5; i++) {
                let val = parseInt(document.getElementById("q" + i).value);

                if (isNaN(val)) {
                    document.getElementById("compatibility").innerText =
                        "Please answer all questions!";
                    return;
                }

                values.push(val);
            }

            // Calculate average
            let sum = values.reduce((a, b) => a + b, 0);
            let average = sum / values.length;

            let percentage = (average / 5) * 100;

            let message = "";
            if (percentage > 80) {
                message = "Im IN LOVE!";
            } else if (percentage > 50) {
                message = "Now Were Getting Somewhere!";
            } else {
                message = "This Isnt working out...";
            }

            document.getElementById("compatibility").innerText =
                "Compatibility Score: " + percentage.toFixed(0) + "% - " + message;
        }

        document.getElementById("calcBtn").addEventListener("click", calculateCompatibility);
    </script>

</body>
</html>
